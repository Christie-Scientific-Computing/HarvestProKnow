name: Tests

"on":
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            tests/requirements-test.txt

      # pyodbc's wheel dynamically links against unixODBC's driver manager
      # at import time (api/cwp_client.py imports it even though the tests
      # mock the actual connection), so it must be present on the runner.
      - name: Install system ODBC libraries
        run: sudo apt-get update && sudo apt-get install -y unixodbc-dev

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Run tests
        run: python -m pytest tests/ -v
